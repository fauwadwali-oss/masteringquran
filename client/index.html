<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <link rel="icon" type="image/png" sizes="64x64" href="/favicon-64.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/favicon-512.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#047857" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Mastering Quran" />
  <title>Mastering Quran | Read, Listen, and Understand the Holy Quran</title>
  <meta name="description" content="A free Quran reader with word-by-word translation, 10 English tafsirs, authentic hadith collections, and an AI assistant grounded in verified scholarship. Study the Holy Quran with confidence." />
  <link rel="canonical" href="https://masteringquran.com/" />

  <!-- Open Graph / Facebook / WhatsApp / LinkedIn -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://masteringquran.com/" />
  <meta property="og:title" content="Mastering Quran | Read, Listen, and Understand the Holy Quran" />
  <meta property="og:description" content="Full Quran with word-by-word translation, 10 English tafsirs, canonical hadith collections, and an AI assistant that cites every source." />
  <meta property="og:image" content="https://masteringquran.com/MQ_shield_logo.png" />
  <meta property="og:image:width" content="1024" />
  <meta property="og:image:height" content="1024" />
  <meta property="og:site_name" content="Mastering Quran" />

  <!-- Twitter / X -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Mastering Quran | Read, Listen, and Understand the Holy Quran" />
  <meta name="twitter:description" content="Full Quran with word-by-word translation, 10 English tafsirs, canonical hadith collections, and an AI assistant that cites every source." />
  <meta name="twitter:image" content="https://masteringquran.com/MQ_shield_logo.png" />

  <!-- Organization schema for Google Knowledge Panel -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Mastering Quran",
      "alternateName": "MasteringQuran",
      "url": "https://masteringquran.com",
      "description": "A free Quran reader with word-by-word translation, 10 English tafsirs, authentic hadith collections, and an AI assistant grounded in verified scholarship.",
      "publisher": {
        "@type": "Organization",
        "name": "Nusrat Wali Ventures LLC",
        "url": "https://nusratwaliventures.com",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Houston",
          "addressRegion": "TX",
          "addressCountry": "US"
        }
      }
    }
  </script>

  <script>
    (function () {
      if (location.hostname.endsWith('pages.dev')) {
        location.replace('https://masteringquran.com' + location.pathname + location.search + location.hash);
      }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&family=Amiri:wght@400;700&display=swap"
    rel="stylesheet" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script type="module">
    const analyticsEndpoint = import.meta.env.VITE_ANALYTICS_ENDPOINT;
    const analyticsWebsiteId = import.meta.env.VITE_ANALYTICS_WEBSITE_ID;
    if (analyticsEndpoint && analyticsWebsiteId) {
      const script = document.createElement("script");
      script.defer = true;
      script.src = `${analyticsEndpoint.replace(/\/$/, "")}/umami`;
      script.dataset.websiteId = analyticsWebsiteId;
      document.body.appendChild(script);
    }
  </script>
</body>

</html>

name = "mq-daily-delivery"
main = "src/index.ts"
compatibility_date = "2024-09-25"
compatibility_flags = ["nodejs_compat"]

# Runs every hour at :05 past.
# The worker will figure out which subscribers are due NOW (their chosen hour in their timezone).
[triggers]
crons = ["5 * * * *"]

# Secrets set via: npx wrangler secret put NAME
# Required:
#   SUPABASE_URL                 — https://hlhtvstvblvdixygchil.supabase.co
#   SUPABASE_SERVICE_ROLE_KEY    — from Supabase project settings → API
#   RESEND_API_KEY               — for email delivery (https://resend.com)
#   VAPID_PUBLIC_KEY             — web push application server public key
#   VAPID_PRIVATE_KEY            — web push application server private key
#   VAPID_SUBJECT                — mailto: address used for web push identity, e.g. mailto:info@masteringquran.com
